name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node -v`
      placeholder: v20.14.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 22 / Windows 11
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: AI provider
      options:
        - OpenRouter
        - Ollama
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      placeholder: ai-commit --dry-run
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Full error output
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
